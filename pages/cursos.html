<!DOCTYPE html>
<html>
    <head>
        <title>Cursos | TechEduca</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">
        <meta name="description" content="Cursos de tecnologia">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <script>
            // Assim que a página carrega, pergunta ao servidor:
            //tem alguém logado?
            fetch("http://localhost:3000/me",{
                credentials: "include" 
                    // Envia o cookie de sessão junto com a requisição
            })
            .then(resposta => {
                if(!resposta.ok){
                    alert("Você precisa fazer o login para acessar os cursos!");
                    window.location.href = "login.html";
                }
                // se resposta.ok = true, a página simplesmente continua carregando
            })

        </script>
        <!-- Cabeçalho reutilizado -->
        <header class="topo"> <!-- Cabeçalho do Site -->
            <div class="logo">
                <a href="../index.html">Tech<span>Educa</span></a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="cursos.html" class="ativo">Cursos</a>
                <a href="contato.html">Contato</a>
            </nav>
        </header>
        <!-- Conteúdo da página -->

          <!-- Seção dos cursos -->
        <section class="cursos">

            <h1>Nossos cursos</h1>

            <input id="BuscarCursos" placeholder="Buscar Cursos">

             <!-- CONTAINER PARA AGRUPAR OS CURSOS -->
            <div id="ListaCursos" class="cursos-grid"> 
                <!-- O JS IRÁ MONTAR OS CURSOS AQUI DENTRO -->
            </div>
        
        
        </section>

        <!-- Rodapé reutilizado -->
        <footer class="rodape">
            <p>® 2026 TechEduca. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

        <script src="../js/script.js"></script>
    </body>
</html>
