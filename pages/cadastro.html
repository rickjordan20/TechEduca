<!DOCTYPE html>
<html>
<!-- Cabeça do Site-->
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">
        <meta name="description" content="A TechEduca oferece cursos de tecnologia e informática." >
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/auth.css">
        <title>Tech Educa - Formação em Tecnologia</title>
    </head>

    <!-- Corpo do Site -->
    <body>
        <header class="topo"> <!-- Cabeçalho do Site -->
            <div class="logo">
                <a href="../index.html">Tech<span>Educa</span></a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
            </nav>
        </header>
    
        <main class="container pagina-auth">
            <section class="bloco-auth">
                <h1>Cadastro</h1>
                <p class="texto-auth">Crie sua conta para acessar os cursos</p>

                <form class="form-auth" id="formCadastro">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                    
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>

                    <label for="confirmasenha">Confirma senha</label>
                    <input type="password" id="confirmasenha" placeholder="Digite sua senha novamente" required>

                    <button type="submit" class="btn-primario">Cadastrar</button>

                    <p id="mensagemCadastro" class="mensagem-auth"></p>
                </form>

                <p class="link-auth">
                    Já possui uma conta? <a href="../pages/login.html">Fazer Login</a>
                </p>
            </section>
        </main>
    
        <footer class="rodape">
            <p>® 2026 TechEduca. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

        <script src="../js/auth.js"></script>
    </body>
</html>
