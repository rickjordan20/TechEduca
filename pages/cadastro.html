<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | TechEduca</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <header>
    <div class="container topo">
      <div class="logo">
        <a href="../index.html">Tech <span>Educa</span></a>
      </div>

      <nav class="menu">
        <a href="../index.html">Início</a>
        <a href="./sobre.html">Sobre</a>
        <a href="./contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container pagina-auth">
    <section class="bloco-auth">
      <h1>Cadastro</h1>
      <p class="texto-auth">Crie sua conta para acessar os cursos.</p>

      <form id="formCadastro" class="form-auth">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required>

        <label for="confirmarSenha">Confirmar senha</label>
        <input type="password" id="confirmarSenha" name="confirmarSenha" required>

        <button type="submit" class="btn-primario">Cadastrar</button>

        <p id="mensagemCadastro" class="mensagem-auth"></p>
      </form>

      <p class="link-auth">
        Já possui conta? <a href="./login.html">Fazer login</a>
      </p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 TechEduca. Todos os direitos reservados.</p>
  </footer>

  <script src="../js/auth.js"></script>
</body>
</html>
