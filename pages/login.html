<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TechEduca</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <header>
    <div class="container topo">
      <div class="logo">
        <a href="../index.html">Tech <span>Educa</span></a>
      </div>

      <nav class="menu">
        <a href="../index.html">Início</a>
        <a href="../pages/sobre.html">Sobre</a>
        <a href="../pages/contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container pagina-auth">
    <section class="bloco-auth">
      <h1>Login</h1>
      <p class="texto-auth">Entre com seu e-mail e senha para acessar os cursos.</p>

      <form id="formLogin" class="form-auth">
        <label for="emailLogin">E-mail</label>
        <input type="email" id="emailLogin" name="emailLogin" required>

        <label for="senhaLogin">Senha</label>
        <input type="password" id="senhaLogin" name="senhaLogin" required>

        <button type="submit" class="btn-primario">Entrar</button>

        <p id="mensagemLogin" class="mensagem-auth"></p>
      </form>

      <p class="link-auth">
        Ainda não possui conta? <a href="../pages/cadastro.html">Criar cadastro</a>
      </p>
    </section>
  </main>

  <!-- Rodapé reutilizado -->
  <footer class="rodape">
      <p>® 2026 TechEduca. Todos os Direitos Reservados</p>
      <p><a href="contato.html">Entre em Contato</a></p>
  </footer>

  <script src="../js/auth.js"></script>
</body>
</html>
