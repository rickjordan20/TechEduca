<!DOCTYPE html>
<html>
    <head>
        <title>Contato | TechEduca</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">
        <meta name="description" content="Fale com a TechEduca">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <!-- Cabeçalho reutilizado -->
        <header class="topo"> <!-- Cabeçalho do Site -->
            <div class="logo">
                <a href="../index.html">Tech<span>Educa</span></a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html" class="ativo">Contato</a>
            </nav>
        </header>

        <!-- Conteúdo da página -->
        <section class="contato">
            <h2>Fale Conosco</h2>
            <!-- Início do Formulário -->
            <form id="formContato">
                <label for="nome">Digite seu nome: </label>
                <input type="text" required id="nome" placeholder="Digite seu nome">
                
                <br><br>
                <label for="email">Digite seu e-mail: </label>
                <input type="email" required id="email" placeholder="Digite seu e-mail">

                <br><br>
                <label for="mensagem">Digite sua mensagem: </label>
                <textarea rows="5" required id="mensagem"></textarea>
                
                <br><br>
                <button type="submit">Enviar</button>
            </form>

<div id="listaMensagens"></div>
        </section>

        <!-- Rodapé reutilizado -->
        <footer class="rodape">
            <p>® 2026 TechEduca. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

    <script src="../js/contato.js"></script>
    </body>
</html>
